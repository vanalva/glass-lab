<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <!-- SA-Tejida (at) — gold woven mesh, ONE seamless 96x96 tile.
       Gaps are transparent (no background, no dark hole rects) so the
       glass blur shows through the weave openings. The threads keep their
       baked gold gradients/highlights/shadow — this is the "Realista" skin. -->
  <defs>
    <linearGradient id="g-h" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5f4b05"/>
      <stop offset="18%" stop-color="#d4b63a"/>
      <stop offset="34%" stop-color="#fff1a0"/>
      <stop offset="48%" stop-color="#b8941b"/>
      <stop offset="68%" stop-color="#4d3b04"/>
      <stop offset="100%" stop-color="#e0c24a"/>
    </linearGradient>
    <linearGradient id="g-v" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4b3903"/>
      <stop offset="18%" stop-color="#caa82e"/>
      <stop offset="35%" stop-color="#fff0a4"/>
      <stop offset="52%" stop-color="#a98718"/>
      <stop offset="72%" stop-color="#3a2d03"/>
      <stop offset="100%" stop-color="#d2b13b"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
    <filter id="mn">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.16"/></feComponentTransfer>
      <feBlend mode="overlay" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Back vertical threads -->
  <g filter="url(#sh)">
    <rect x="8"  y="-12" width="16" height="120" rx="8" fill="url(#g-v)" filter="url(#mn)"/>
    <rect x="56" y="-12" width="16" height="120" rx="8" fill="url(#g-v)" filter="url(#mn)"/>
  </g>

  <!-- Front horizontal threads -->
  <g filter="url(#sh)">
    <rect x="-12" y="8"  width="120" height="16" rx="8" fill="url(#g-h)" filter="url(#mn)"/>
    <rect x="-12" y="56" width="120" height="16" rx="8" fill="url(#g-h)" filter="url(#mn)"/>
  </g>

  <!-- Re-draw vertical segments that pass OVER horizontals (the weave) -->
  <g filter="url(#sh)">
    <rect x="8"  y="24"  width="16" height="32" rx="8" fill="url(#g-v)" filter="url(#mn)"/>
    <rect x="56" y="72"  width="16" height="32" rx="8" fill="url(#g-v)" filter="url(#mn)"/>
    <rect x="56" y="-24" width="16" height="32" rx="8" fill="url(#g-v)" filter="url(#mn)"/>
  </g>

  <!-- Bright thread highlights -->
  <path d="M-4 13 H96" stroke="#fff4a8" stroke-width="2" opacity="0.45"/>
  <path d="M-4 61 H96" stroke="#fff4a8" stroke-width="2" opacity="0.35"/>
  <path d="M13 -4 V96" stroke="#fff4a8" stroke-width="2" opacity="0.35"/>
  <path d="M61 -4 V96" stroke="#fff4a8" stroke-width="2" opacity="0.3"/>
</svg>
