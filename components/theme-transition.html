<!-- ============================================================================
     COMPONENT: Theme Transition (SVG bar wipe)
     ----------------------------------------------------------------------------
     A full-viewport section whose SVG bars converge on scroll while the section
     cross-fades from the page's base theme into the OPPOSITE theme, bridging
     into the footer that follows. Reusable + SVG-swappable.

     DEPENDENCIES
       • css/project.css  → .gl-theme-transition / .gl-tt_* / .gl-bar* rules
       • js/gl-theme-transition.js  (load before </body>, after GSAP+ScrollTrigger)
       • GSAP 3 + ScrollTrigger (already loaded on every main page)

     HOW TO USE  (place immediately BEFORE the page <footer>)
       1. Paste ONE of the two <section> variants below.
       2. Give the page's <footer> the OPPOSITE theme class so the page ends
          in the flipped theme:
            Glass Lab pages → <footer class="gl-home_footer u-theme-light">
            Pernia    pages → <footer class="pg-footer u-theme-dark">
       3. Ensure  <script src="../js/gl-theme-transition.js"></script>  is loaded.

     SWAPPING THE SVG  (the point of the component)
       gl-theme-transition.js animates ANY descendant with class
       "gl-bar gl-bar-l" (slides from the left) or "gl-bar gl-bar-r" (from the
       right). Background, bar fill and quote colour are driven generically by
       the direction class — nothing is hardcoded to these 12 polygons. To use a
       different graphic, replace the <svg> inner content with new shapes tagged
       the same way and keep everything else.

       The bar fill is NOT set in the SVG (CSS sets it per direction), so the same
       markup works for both directions.

       Edit the <p class="gl-tt_quote"> copy per page as desired.
     ============================================================================ -->
