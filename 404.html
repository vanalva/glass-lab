    var win = window;
    if (win.__fwFreeze) return;

    var frozen = false;
    var rafQueue = [];        // deferred rAF callbacks {id, cb}
    var timeoutQueue = [];     // deferred setTimeout callbacks (run once on resume)
    var idSeq = 1;

    var origRaf = (win.requestAnimationFrame || function (cb) { return win.setTimeout(function () { cb(Date.now()); }, 16); }).bind(win);
    var origCaf = (win.cancelAnimationFrame || function () {}).bind(win);
    var origSetTimeout = win.setTimeout.bind(win);
    var origSetInterval = win.setInterval.bind(win);

    // --- requestAnimationFrame: queue while frozen, flush on resume ---
    win.requestAnimationFrame = function (cb) {
        if (!frozen) return origRaf(cb);
        var id = idSeq++;
        rafQueue.push({ id: id, cb: cb });
        return id;
    };
    win.cancelAnimationFrame = function (id) {
        for (var i = 0; i < rafQueue.length; i++) {
            if (rafQueue[i].id === id) { rafQueue.splice(i, 1); return; }
        }
        origCaf(id);
    };

    // --- setTimeout: defer callback while frozen (run once on resume) ---
    win.setTimeout = function (fn, delay) {
        if (typeof fn !== 'function') return origSetTimeout.apply(win, arguments);
        var extra = Array.prototype.slice.call(arguments, 2);
        var wrapped = function () {
            if (frozen) { timeoutQueue.push(function () { fn.apply(win, extra); }); return; }
            fn.apply(win, extra);
        };
        return origSetTimeout(wrapped, delay);
    };

    // --- setInterval: skip ticks while frozen (re-fires naturally on resume) ---
    win.setInterval = function (fn, delay) {
        if (typeof fn !== 'function') return origSetInterval.apply(win, arguments);
        var extra = Array.prototype.slice.call(arguments, 2);
        var wrapped = function () { if (!frozen) fn.apply(win, extra); };
        return origSetInterval(wrapped, delay);
    };

    // --- CSS pause stylesheet (added once, toggled via html.fw-frozen) ---
    function ensureStyle() {
        if (win.__fwFreezeStyle) return;
        try {
            var s = document.createElement('style');
            s.id = 'fw-freeze-style';
            s.textContent = 'html.fw-frozen *, html.fw-frozen *::before, html.fw-frozen *::after {' +

                ' scroll-behavior: auto !important; }';

        } catch (e) {}
    }

    var pausedMedia = [];
    function freezeMedia() {
        pausedMedia = [];
        try {
            var media = document.querySelectorAll('video, audio');
            for (var i = 0; i < media.length; i++) {
                var m = media[i];
                if (!m.paused) { pausedMedia.push(m); try { m.pause(); } catch (e) {} }
            }
        } catch (e) {}
    }
    function resumeMedia() {
        for (var i = 0; i < pausedMedia.length; i++) {
            try { pausedMedia[i].play(); } catch (e) {}
        }
        pausedMedia = [];

        ensureStyle();
        try { document.documentElement.classList.toggle('fw-frozen', frozen); } catch (e) {}

            freezeMedia();
        } else {
            // Flush deferred work
            var rq = rafQueue; rafQueue = [];
            for (var i = 0; i < rq.length; i++) { try { rq[i].cb(Date.now()); } catch (e) {} }

            for (var j = 0; j < tq.length; j++) { try { tq[j](); } catch (e) {} }

        if (e.data.type === 'fw-freeze') setFrozen(true);
